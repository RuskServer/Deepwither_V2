name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build
        id: build
        shell: bash
        run: |
          set -o pipefail
          ./gradlew build --stacktrace 2>&1 | tee build.log

      - name: Job Summary
        if: always()
        shell: bash
        run: |
          {
            echo "# CI Summary"
            echo
            echo "- Workflow: \`build\`"
            echo "- Status: \`${{ job.status }}\`"
            echo "- Event: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo
            if [ -f build.log ]; then
              echo "## Build Log Tail"
              echo
              echo '```text'
              tail -n 80 build.log
              echo '```'
            else
              echo "_No build log was produced._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
